query recentRequests($startday: LocalDate!, $stopdate: LocalDate!) {
  requestLogs(startday: $startday, stopdate: $stopdate, order: [{ id: DESC }]) {
    employeeName
    reason
    timeOfDay
  }
}

query LogHistory {
  manualLogs(order: [{ id: DESC }]) {
    employeeName
    currentDate
    timeOfDay
    reason
    clockIn
    clockOut
    actionBy
  }
}
